<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WKN Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-dark: #1a1a2e;
      --bg-card: #16213e;
      --accent: #0f3460;
      --highlight: #e94560;
      --text: #eaeaea;
      --text-muted: #8b8b9a;
      --border: #2a2a4a;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2rem;
      text-align: center;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    header p {
      color: var(--text-muted);
    }

    .card {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border: 1px solid var(--border);
    }

    .card h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--text);
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
      color: var(--text-muted);
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-dark);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--highlight);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--highlight);
      color: white;
    }

    .btn-primary:hover {
      background: #ff5a7a;
    }

    .btn-primary:disabled {
      background: #666;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--accent);
      color: white;
    }

    .btn-secondary:hover {
      background: #1a4a7a;
    }

    .row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .row .form-group {
      flex: 1;
      min-width: 200px;
    }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: var(--highlight);
      background: rgba(233, 69, 96, 0.1);
    }

    .drop-zone input[type="file"] {
      display: none;
    }

    .drop-zone p {
      color: var(--text-muted);
    }

    .results {
      margin-top: 2rem;
    }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .results-header h2 {
      margin-bottom: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    th, td {
      padding: 0.75rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    th {
      background: var(--accent);
      font-weight: 600;
      color: var(--text);
    }

    th:first-child {
      border-radius: 8px 0 0 0;
    }

    th:last-child {
      border-radius: 0 8px 0 0;
    }

    tr:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .error {
      background: rgba(233, 69, 96, 0.2);
      border: 1px solid var(--highlight);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
      color: var(--highlight);
    }

    .loader {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--text-muted);
      border-radius: 50%;
      border-top-color: var(--highlight);
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hidden {
      display: none;
    }

    @media (max-width: 768px) {
      body {
        padding: 1rem;
      }

      .row {
        flex-direction: column;
      }

      table {
        font-size: 0.75rem;
      }

      th, td {
        padding: 0.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>WKN Dashboard</h1>
      <p>OpenFIGI WKN Abfrage</p>
    </header>

    <div class="card">
      <h2>API Konfiguration</h2>
      <div class="form-group">
        <label for="apiKey">OpenFIGI API Key</label>
        <input type="password" id="apiKey" placeholder="API Key eingeben">
      </div>
    </div>

    <div class="card">
      <h2>Einzelne WKN Abfrage</h2>
      <div class="row">
        <div class="form-group">
          <label for="wknInput">WKN</label>
          <input type="text" id="wknInput" placeholder="z.B. 851399">
        </div>
        <div class="form-group" style="display: flex; align-items: flex-end;">
          <button class="btn btn-primary" id="queryBtn" onclick="querySingle()">Abfragen</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>CSV Upload</h2>
      <div class="drop-zone" id="dropZone" onclick="document.getElementById('csvFile').click()">
        <input type="file" id="csvFile" accept=".csv,.txt">
        <p>CSV Datei hier ablegen oder klicken zum Auswählen</p>
      </div>
      <div style="margin-top: 1rem;">
        <button class="btn btn-secondary" id="uploadBtn" onclick="uploadCsv()">Hochladen & Abfragen</button>
      </div>
    </div>

    <div id="errorMsg" class="error hidden"></div>

    <div class="results hidden" id="resultsSection">
      <div class="results-header">
        <h2>Ergebnisse (<span id="resultCount">0</span>)</h2>
        <button class="btn btn-secondary" onclick="exportCsv()">Als CSV Exportieren</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>WKN</th>
            <th>Name</th>
            <th>US Ticker</th>
            <th>DE Ticker</th>
            <th>EUR Ticker</th>
          </tr>
        </thead>
        <tbody id="resultsTable"></tbody>
      </table>
    </div>
  </div>

  <script>
    let currentResults = [];

    const apiKeyInput = document.getElementById('apiKey');
    const wknInput = document.getElementById('wknInput');
    const dropZone = document.getElementById('dropZone');
    const csvFile = document.getElementById('csvFile');
    const errorMsg = document.getElementById('errorMsg');
    const resultsSection = document.getElementById('resultsSection');
    const resultCount = document.getElementById('resultCount');
    const resultsTable = document.getElementById('resultsTable');
    const queryBtn = document.getElementById('queryBtn');
    const uploadBtn = document.getElementById('uploadBtn');

    const storedKey = sessionStorage.getItem('openfigi_api_key');
    if (storedKey) {
      apiKeyInput.value = storedKey;
    }

    apiKeyInput.addEventListener('change', () => {
      sessionStorage.setItem('openfigi_api_key', apiKeyInput.value);
    });

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        csvFile.files = files;
        dropZone.querySelector('p').textContent = files[0].name;
      }
    });

    csvFile.addEventListener('change', () => {
      if (csvFile.files.length > 0) {
        dropZone.querySelector('p').textContent = csvFile.files[0].name;
      }
    });

    function showError(message) {
      errorMsg.textContent = message;
      errorMsg.classList.remove('hidden');
    }

    function hideError() {
      errorMsg.classList.add('hidden');
    }

    function setLoading(loading) {
      queryBtn.disabled = loading;
      uploadBtn.disabled = loading;
      if (loading) {
        queryBtn.innerHTML = '<span class="loader"></span>';
      } else {
        queryBtn.textContent = 'Abfragen';
      }
    }

    async function querySingle() {
      const wkn = wknInput.value.trim();
      if (!wkn) {
        showError('Bitte eine WKN eingeben');
        return;
      }

      hideError();
      setLoading(true);

      try {
        const response = await fetch('/api/query', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            wkns: [wkn],
            apiKey: apiKeyInput.value
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Fehler bei der Abfrage');
        }

        currentResults = data.results || [];
        displayResults();
      } catch (error) {
        showError(error.message);
      } finally {
        setLoading(false);
      }
    }

    async function uploadCsv() {
      if (!csvFile.files.length) {
        showError('Bitte eine CSV Datei auswählen');
        return;
      }

      hideError();
      setLoading(true);

      try {
        const formData = new FormData();
        formData.append('file', csvFile.files[0]);
        formData.append('apiKey', apiKeyInput.value);

        const response = await fetch('/api/upload', {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Fehler beim Upload');
        }

        currentResults = data.results || [];
        displayResults();
      } catch (error) {
        showError(error.message);
      } finally {
        setLoading(false);
      }
    }

    function displayResults() {
      resultCount.textContent = currentResults.length;
      resultsTable.innerHTML = '';

      for (const row of currentResults) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${escapeHtml(row.wkn)}</td>
          <td>${escapeHtml(row.name)}</td>
          <td>${escapeHtml(row.us_ticker)}</td>
          <td>${escapeHtml(row.de_ticker)}</td>
          <td>${escapeHtml(row.eur_ticker)}</td>
        `;
        resultsTable.appendChild(tr);
      }

      resultsSection.classList.remove('hidden');
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function exportCsv() {
      if (currentResults.length === 0) return;

      const params = new URLSearchParams({
        data: encodeURIComponent(JSON.stringify(currentResults))
      });

      window.location.href = '/api/export?' + params;
    }

    wknInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        querySingle();
      }
    });
  </script>
</body>
</html>
